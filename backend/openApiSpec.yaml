openapi: 3.0.0
info:
  title: HRMS Lite API
  version: 1.0.0
  description: Simple HRMS API for employee and attendance management

servers:
  - url: http://localhost:8080/

paths:

  /employee:
    post:
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - full_name
                - email
                - department
              properties:
                full_name:
                  type: string
                email:
                  type: string
                department:
                  type: string

      responses:
        "201":
          description: Employee created
        "400":
          description: Validation error

    get:
      summary: Get all employees
      responses:
        "200":
          description: Employee list

  /employees/{id}:
    delete:
      summary: Delete employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Employee deleted
        "404":
          description: Not found


  /attendance:
    post:
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - employee_id
                - date
                - status
              properties:
                employee_id:
                  type: string
                date:
                  type: string
                status:
                  type: string
                  enum: [Present, Absent]

      responses:
        "201":
          description: Attendance recorded
        "400":
          description: Invalid request

  /attendance/{employee_id}:
    get:
      summary: Get employee attendance
      parameters:
        - in: path
          name: employee_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendance list